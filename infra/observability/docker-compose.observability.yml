version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ampm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    image: grafana/grafana:latest
    container_name: ampm-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin-change-me
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  settlement-worker:
    build:
      context: ../../services/settlement-worker
    container_name: ampm-settlement-worker
    restart: unless-stopped
    environment:
      - SETTLEMENT_API_BASE_URL=http://host.docker.internal:3000
      - SETTLEMENT_WORKER_TOKEN=${SETTLEMENT_WORKER_TOKEN}
      - WORKER_POLL_INTERVAL_MS=1500
      - WORKER_JENGA_RECONCILE_EVERY_LOOPS=20
      - WORKER_JENGA_DRIFT_CHECK_EVERY_LOOPS=40
      - WORKER_METRICS_PORT=9464
    ports:
      - "9464:9464"

volumes:
  grafana_data:

